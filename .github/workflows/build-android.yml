name: Build Production Android APK/AAB

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools-version: '36.0.0'
          ndk-version: '26.1.10909125'

      - name: Create production environment file
        run: |
          cat > .env.production << 'EOF'
          VITE_FIREBASE_API_KEY=AIzaSyBTs335BzPWM510W6TJHH9U9Ln25ZBHWoA
          VITE_FIREBASE_AUTH_DOMAIN=autoparts-e668d.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=autoparts-e668d
          VITE_FIREBASE_STORAGE_BUCKET=autoparts-e668d.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID=419854574545
          VITE_FIREBASE_APP_ID=1:419854574545:web:c7eb06038e6a85337adf53
          VITE_GOOGLE_MAPS_PLATFORM_KEY=AIzaSyBTs335BzPWM510W6TJHH9U9Ln25ZBHWoA
          EOF

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Vite production bundle
        run: npm run build

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets
          cp -r dist android/app/src/main/assets/public

      - name: Setup Gradle wrapper
        run: |
          cd android
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew clean assembleRelease \
            --parallel \
            -x lintVitalRelease \
            -x lintRelease

      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            --parallel \
            -x lintVitalRelease \
            -x lintRelease
        continue-on-error: true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-parts-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-parts-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          release_name: Auto Parts APK v1.0.0 (Build ${{ github.run_number }})
          body: |
            # Auto Parts Android Application
            
            Production-ready APK and AAB for Google Play Store
            
            ## Downloads
            - **APK (Unsigned)**: Download from artifacts
            - **AAB**: Download from artifacts for Play Store submission
            
            ## Build Info
            - **Package**: com.autoparts.app
            - **Version**: 1.0.0
            - **Build**: ${{ github.run_number }}
            - **Commit**: ${{ github.sha }}
            
            ## Features
            - Firebase Authentication
            - Firestore Real-time Database
            - Firebase Storage
            - Google Maps Integration
            - Multi-language Support (English, Hindi)
            - Offline Mode Support
            - Material Design 3 UI
            
            ## Installation
            For testing: `adb install -r app-release-unsigned.apk`
            For Play Store: Upload AAB file to Google Play Console
          draft: false
          prerelease: false

      - name: Upload Release Assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          asset_name: auto-parts-v1.0.0-${{ github.run_number }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Print build summary
        run: |
          echo "=== Build Summary ==="
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            echo "✓ APK generated successfully"
            ls -lh android/app/build/outputs/apk/release/app-release-unsigned.apk
          else
            echo "✗ APK not found"
          fi
          if [ -f "android/app/build/outputs/bundle/release/app-release.aab" ]; then
            echo "✓ AAB generated successfully"
            ls -lh android/app/build/outputs/bundle/release/app-release.aab
          else
            echo "⚠ AAB not generated (optional)"
          fi
